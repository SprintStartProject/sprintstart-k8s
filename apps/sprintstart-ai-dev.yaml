apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: sprintstart-ai-dev
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/SprintStartProject/sprintstart-k8s
    targetRevision: main
    path: overlays/dev/sprintstart-ai
  destination:
    server: https://kubernetes.default.svc
    namespace: sprintstart-dev
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
