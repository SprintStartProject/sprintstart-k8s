apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: sprintstart-keycloak-prod
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/SprintStartProject/sprintstart-k8s
    targetRevision: main
    path: overlays/prod/sprintstart-keycloak
  destination:
    server: https://kubernetes.default.svc
    namespace: sprintstart
  syncPolicy:
    syncOptions:
      - CreateNamespace=false
