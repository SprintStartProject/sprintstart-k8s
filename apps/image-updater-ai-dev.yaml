apiVersion: argocd-image-updater.argoproj.io/v1alpha1
kind: ImageUpdater
metadata:
  name: sprintstart-ai-dev
  namespace: argocd
spec:
  commonUpdateSettings:
    updateStrategy: digest
  writeBackConfig:
    method: argocd
  applicationRefs:
    - namePattern: sprintstart-ai-dev
      images:
        - alias: ai
          imageName: ghcr.io/sprintstartproject/sprintstart-ai:dev
