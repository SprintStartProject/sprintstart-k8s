apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: sprintstart-dev

resources:
  - ../../../base/sprintstart-keycloak

images:
  - name: ghcr.io/sprintstartproject/sprintstart-keycloak
    newTag: dev

patches:
  - patch: |-
      - op: replace
        path: /spec/rules/0/host
        value: keycloak.dev.sprintstart.local
      - op: replace
        path: /spec/tls/0/hosts/0
        value: keycloak.dev.sprintstart.local
    target:
      kind: Ingress
      name: sprintstart-keycloak
