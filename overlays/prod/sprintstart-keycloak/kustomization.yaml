apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: sprintstart

resources:
  - ../../../base/sprintstart-keycloak

configMapGenerator:
  - name: sprintstart-keycloak-realm
    files:
      - sprintstart-realm.json
    options:
      disableNameSuffixHash: true

patches:
  - patch: |-
      - op: replace
        path: /spec/template/spec/containers/0/args
        value: ["start", "--optimized"]
    target:
      kind: Deployment
      name: sprintstart-keycloak
