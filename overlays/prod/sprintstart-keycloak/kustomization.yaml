apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: sprintstart

resources:
  - ../../../base/sprintstart-keycloak

patches:
  - patch: |-
      - op: replace
        path: /spec/template/spec/containers/0/args
        value: ["start", "--optimized"]
    target:
      kind: Deployment
      name: sprintstart-keycloak
