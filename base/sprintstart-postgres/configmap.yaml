apiVersion: v1
kind: ConfigMap
metadata:
  name: sprintstart-postgres-init
data:
  init.sh: |
    #!/bin/bash
    set -e
    psql -v ON_ERROR_STOP=1 --username "$POSTGRES_USER" --dbname "$POSTGRES_DB" <<-EOSQL
      CREATE USER sprintstart WITH PASSWORD '$SPRINTSTART_DB_PASSWORD';
      CREATE DATABASE sprintstart OWNER sprintstart;

      CREATE USER keycloak WITH PASSWORD '$KEYCLOAK_DB_PASSWORD';
      CREATE DATABASE keycloak OWNER keycloak;
    EOSQL
