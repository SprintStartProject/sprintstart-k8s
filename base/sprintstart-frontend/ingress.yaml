apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: sprintstart-frontend
  annotations:
    nginx.ingress.kubernetes.io/rewrite-target: /
spec:
  ingressClassName: nginx
  tls:
  - hosts:
    - sprintstart.local
    secretName: sprintstart-tls
  rules:
  - host: sprintstart.local
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: sprintstart-frontend
            port:
              number: 80
